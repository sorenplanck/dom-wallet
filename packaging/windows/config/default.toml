# DOM Wallet — default configuration.
#
# This file is read on first launch. Settings can be overridden via the
# Configurações panel inside the app; user changes are persisted to
# runtime/runtime.json so this file is not rewritten.
#
# Portable mode: all paths in this file are RELATIVE to the directory that
# contains DOM Wallet.exe. Do not use absolute paths — moving the folder
# would break them.

[chain]
# The deterministic chain identifier. Do not change unless you are
# bootstrapping a separate DOM-compatible network.
chain_id = "dom-devnet-1"

[network]
# DOM backbone bootstrap peer. The wallet seeds its peer registry with this
# entry on first launch and always retains it.
bootstrap_peer = "168.100.8.245:33370"

# Number of peer slots the registry will populate beyond the backbone.
target_peer_count = 8

[mining]
# Whether the embedded miner is enabled by default. Independent of wallet
# unlock state — the miner runs as infrastructure when on.
enabled = false

# Required leading zero bits in the block hash. DEVNET v1 = 16.
difficulty_bits = 16

[ui]
# Whether the app starts hidden (system tray only) on Windows auto-start.
start_hidden = false

# Default language for UI strings. Currently only "pt-BR" is supported.
language = "pt-BR"

[updates]
# Enable daily check against GitHub releases for a newer portable .zip.
check_enabled = true

# Repository to query. Format: <owner>/<repo>.
github_repo = "sorenplanck/dom-wallet"
