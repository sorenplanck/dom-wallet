# DOM Wallet — portable Windows release pipeline (Linux cross-compile).
#
# Compiles Windows .exe from an Ubuntu runner using MinGW.
# Runners Linux têm filas instantâneas mesmo em repos privados/grandes filas.

name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows portable (Linux cross)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install MinGW
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Install Rust (stable, gnu target)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-gnu

      - name: Cache cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-gnu-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-gnu-

      - name: Build (release, x86_64-pc-windows-gnu)
        run: |
          cargo build --release --target x86_64-pc-windows-gnu

      - name: Stage portable layout
        run: |
          STAGE="dist/DOM-Wallet-Windows-Portable"
          mkdir -p "$STAGE"
          cp "target/x86_64-pc-windows-gnu/release/dom-wallet-app.exe" "$STAGE/DOM Wallet.exe"

          for d in chain wallet peers logs snapshots runtime updates config; do
            mkdir -p "$STAGE/$d"
            touch "$STAGE/$d/.keep"
          done

          if [ -f "packaging/windows/config/default.toml" ]; then
            cp "packaging/windows/config/default.toml" "$STAGE/config/default.toml"
          fi
          if [ -f "packaging/windows/peers/peers.json" ]; then
            cp "packaging/windows/peers/peers.json" "$STAGE/peers/peers.json"
          fi

          cp README.md "$STAGE/README.md"
          [ -f LICENSE ] && cp LICENSE "$STAGE/LICENSE"

      - name: Verify executable
        run: |
          EXE="dist/DOM-Wallet-Windows-Portable/DOM Wallet.exe"
          if [ ! -f "$EXE" ]; then
            echo "executable not found at $EXE"
            exit 1
          fi
          size=$(stat -c%s "$EXE")
          echo "DOM Wallet.exe size: $size bytes"
          if [ "$size" -lt 1000000 ]; then
            echo "binary suspiciously small: $size bytes"
            exit 1
          fi

      - name: Create portable ZIP
        run: |
          cd dist
          zip -r DOM-Wallet-Windows-Portable.zip DOM-Wallet-Windows-Portable
          sha256sum DOM-Wallet-Windows-Portable.zip | awk '{print $1"  DOM-Wallet-Windows-Portable.zip"}' > DOM-Wallet-Windows-Portable.zip.sha256
          cat DOM-Wallet-Windows-Portable.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DOM-Wallet-Windows-Portable
          path: |
            dist/DOM-Wallet-Windows-Portable.zip
            dist/DOM-Wallet-Windows-Portable.zip.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Attach to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/DOM-Wallet-Windows-Portable.zip
            dist/DOM-Wallet-Windows-Portable.zip.sha256
          draft: false
          prerelease: false
          generate_release_notes: true
          name: ${{ github.ref_name }}
          body: |
            ## DOM Wallet ${{ github.ref_name }}

            **Deterministic Monetary Network** — desktop client.

            ### Portable install
            1. Download `DOM-Wallet-Windows-Portable.zip`.
            2. Extract anywhere — no installer, no admin.
            3. Run `DOM Wallet.exe`. All state lives next to the .exe.

            ### Bundled
            - `DOM Wallet.exe` — wallet + embedded DOM node + miner
            - `config/default.toml` (bootstrap peer `168.100.8.245:33370`)
            - portable directory skeleton (`chain/ wallet/ peers/ ...`)

            ### Verification
            SHA-256 published as `DOM-Wallet-Windows-Portable.zip.sha256`.

            Built via MinGW cross-compile on Linux (`x86_64-pc-windows-gnu`).
