# Continuous integration — keep the build green on every push.
#
# Runs cargo check against x86_64-pc-windows-msvc to verify the codebase
# compiles for the target platform. Clippy enforces a baseline.

name: ci

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  check-windows:
    name: Check (Windows MSVC)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: x86_64-pc-windows-msvc

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci-${{ hashFiles('**/Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-ci-
            ${{ runner.os }}-cargo-

      - name: cargo fmt --check
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: cargo check
        run: cargo check --target x86_64-pc-windows-msvc --all-targets

      - name: cargo clippy
        run: cargo clippy --target x86_64-pc-windows-msvc --all-targets -- -D warnings
        continue-on-error: true
